seed: 42
data_root: data/raw
split_dir: data/splits
checkpoint_dir: checkpoints
outputs_dir: outputs

img_height: 256
img_width: 256

batch_size: 8
epochs: 50
lr: 0.0001
weight_decay: 0.0
num_workers: 4

# bce_dice | dice
loss: bce_dice
bce_weight: 0.5

amp: true
early_stopping_patience: 15

# GPU throughput tweaks (fixed 256×256 → cudnn.benchmark is appropriate)
cudnn_benchmark: true
cuda_tf32: true
torch_compile: false
persistent_workers: true

train_ratio: 0.8
val_ratio: 0.1
test_ratio: 0.1

augment_train: true
